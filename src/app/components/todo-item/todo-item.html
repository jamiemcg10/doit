<div
  class="flex rounded-sm border border-gray-400 p-4 mb-2 justify-between"
  (dblclick)="toggleComplete()"
>
  <div>
    <input
      type="checkbox"
      class="scale-150"
      [checked]="item().completed"
      (input)="toggleComplete()"
    />
    <span class="ml-2 text-lg font-semibold">{{ item().name }}</span>
  </div>
  <div class="flex space-x-2">
    <icon-button icon="move_item" [style]="{ rotate: '180deg' }" />
    <icon-button icon="edit" />
    <icon-button icon="delete" (click)="deleteItem($event)" />
    <icon-button icon="move_item" />
  </div>
</div>
